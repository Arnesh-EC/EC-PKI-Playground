# pki-orchestrator agent config — manual / dev flow.
#
# Real deployed VMs never use this file: the Celery clone worker mints a fresh
# vm_id/token per VM and renders an orchestrator.toml (identical schema) onto
# the firstboot ISO (see configgen.render_orchestrator_config + tasks.py). This
# copy is for running the agent by hand against a locally-registered identity:
#
#   1. POST /api/orchestrator/register  ->  { vm_id, token }   (needs VM_CLONE)
#   2. paste both below
#   3. run the agent: pki-orchestrator.exe  (loads config.toml from its
#      default_path; pass this file explicitly for a dev run)
#
# The agent connects OUTBOUND to  {backend.url}/api/orchestrator/connect  over
# WebSocket, so backend.url is the only host-specific value — set it to the
# public tunnel origin so a VM off the lab network can still phone home.

[identity]
vm_id = "REPLACE_WITH_REGISTER_VM_ID"
agent_token = "REPLACE_WITH_REGISTER_TOKEN"
role = "operator"

[backend]
url = "https://pki-lab.4rc.tech"

[service]
log_level = "info"
